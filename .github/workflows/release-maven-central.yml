name: Maven Central publication disabled
run-name: ${{ github.actor }} checked legacy Maven Central publication status

on:
  workflow_dispatch:

jobs:
  maven-central-disabled:
    runs-on: [self-hosted, corese-stack-ubuntu-24]

    steps:
      - name: Explain disabled publication
        run: |
          echo "Maven Central publication is intentionally disabled for corese-gui-swing."
          echo "The fr.inria.corese:corese-gui coordinates are now published from corese-stack/corese-gui."
          echo "This legacy 4.x line should be released through GitHub Releases only."
